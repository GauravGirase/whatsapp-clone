apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service-api
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gchat
  template:
    metadata:
      labels:
        app: gchat
        service: chat-service-api
        env: dev
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: chat-service-container
          image: gauravgirase/whatsappclone:v1.0.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: backend-configmap
            - secretRef:
                name: backend-secret

          resources:
            requests:
              cpu: "500m"
              memory: "250Mi"
            limits:
              cpu: "1000m"
              memory: "500Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
